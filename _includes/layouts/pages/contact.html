---
layout: main
---

<main class="contact-page">
    <div class="contact-page__container">
        <!-- Right panel on desktop (top on mobile): Social media, email, and content -->
        <div class="contact-page__info">
            <!-- Social Media Links -->
            {% include "components/social-links.html", containerClass: "contact-page__social-media", headingTag: "h2", showHeading: true %}

            <!-- Email Link -->
            <div class="contact-page__email">
                <a href="mailto:hello@dulceilustra.com">
                    hello@dulceilustra.com
                </a>
            </div>

            <!-- Page Content -->
            <div class="contact-page__content">
                {{ content }}
            </div>
        </div>

        <!-- Left panel on desktop (bottom on mobile): Contact image -->
        <div class="contact-page__image">
            <img
                src="/images/dulceilustra__contacto.gif"
                alt=""
                role="presentation"
            />
        </div>
    </div>
</main>
