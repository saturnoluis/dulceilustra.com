---
layout: gallery
---

<dialog open class="gallery-item-dialog">
    <section class="gallery-item">
        <div class="gallery-item__container">
            <header class="gallery-item__header">
                <a
                    href="/gallery"
                    id="close-buttton"
                    class="gallery-item__close-button"
                >
                    <span class="close-label es">Cerrar</span>
                    <span class="close-icon">⛌</span>
                    <span class="close-label en">Close</span>
                </a>
            </header>
            <div class="gallery-item__content">{{ content }}</div>
            <footer class="gallery-item__footer">
                <a
                    href="#"
                    id="prev-button"
                    class="gallery-item__footer-button gallery-item__footer-button--prev"
                    style="opacity: 0; pointer-events: none"
                >
                    <img
                        src="/images/dulceilustra_arrow.svg"
                        alt="Previous image"
                    />
                    <div class="gallery-item__footer-button__legend">
                        <span class="es">anterior</span>
                        <span class="en">previous</span>
                    </div>
                </a>
                <a href="/" class="gallery-item__logo">
                    <img
                        src="/images/dulceilustra__firma.png"
                        alt="@dulceilustra"
                    />
                </a>
                <a
                    href="#"
                    id="next-button"
                    class="gallery-item__footer-button gallery-item__footer-button--next right"
                    style="opacity: 0; pointer-events: none"
                >
                    <div class="gallery-item__footer-button__legend">
                        <span class="es">siguiente</span>
                        <span class="en">next</span>
                    </div>
                    <img
                        src="/images/dulceilustra_arrow.svg"
                        alt="Next image"
                    />
                </a>
            </footer>
        </div>
    </section>
</dialog>

<script>
    // Extract category from current URL and setup prev/next navigation
    const currentUrl = "{{ page.url }}";
    const match = currentUrl.match(/\/gallery\/([^/]+)\//);

    if (match) {
        const categorySlug = match[1];
        let collection = [];

        // Get the appropriate collection based on category
        switch(categorySlug) {
            case 'digital-art':
                collection = [
                    {%- for item in collections.digitalArt -%}
                    { url: "{{ item.url }}" },
                    {%- endfor -%}
                ];
                break;
            case 'paintings':
                collection = [
                    {%- for item in collections.paintings -%}
                    { url: "{{ item.url }}" },
                    {%- endfor -%}
                ];
                break;
            case 'drawings':
                collection = [
                    {%- for item in collections.drawings -%}
                    { url: "{{ item.url }}" },
                    {%- endfor -%}
                ];
                break;
            case 'comics':
                collection = [
                    {%- for item in collections.comics -%}
                    { url: "{{ item.url }}" },
                    {%- endfor -%}
                ];
                break;
        }

        // Find current index
        const currentIndex = collection.findIndex(item => item.url === currentUrl);

        if (currentIndex !== -1) {
            const prevButton = document.getElementById('prev-button');
            const nextButton = document.getElementById('next-button');
            const hash = window.location.hash;

            // Setup previous button
            if (currentIndex > 0) {
                const prevUrl = collection[currentIndex - 1].url + (hash || '');
                prevButton.href = prevUrl;
                prevButton.style.opacity = '1';
                prevButton.style.pointerEvents = 'auto';
            }

            // Setup next button
            if (currentIndex < collection.length - 1) {
                const nextUrl = collection[currentIndex + 1].url + (hash || '');
                nextButton.href = nextUrl;
                nextButton.style.opacity = '1';
                nextButton.style.pointerEvents = 'auto';
            }
        }
    }
</script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const hash = window.location.hash;

        // Update close button with hash
        if (hash) {
            const goBackLink = document.getElementById("close-buttton");
            goBackLink.href = "/gallery" + hash;
        }

        // Disable body scrolling while modal is open
        const body = document.body;
        if (body) {
            body.style.overflow = "hidden";
			body.style.paddingRight = "15px"; // Adjust for scrollbar width
        }
    });
</script>
