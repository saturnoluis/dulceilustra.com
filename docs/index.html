<script>
    // Carousel functionality
    const trackContainer = document.querySelector(".carousel__track-container");
    const track = document.querySelector(".carousel__track");
    const slides = Array.from(track.children);

    const leftButton = document.querySelector(".carousel__button--left");
    const rightButton = document.querySelector(".carousel__button--right");

    let currentIndex = 0;
    let touchStartX = 0;
    let touchEndX = 0;
    let isDragging = false;

    const moveToSlide = (targetIndex) => {
        if (!slides.length) return;

        // Wrap around if going past the end
        if (targetIndex >= slides.length) {
            targetIndex = 0;
        } else if (targetIndex < 0) {
            targetIndex = slides.length - 1;
        }

        currentIndex = targetIndex;

        const percentage = 100 / slides.length;
        const amountToMove = percentage * currentIndex * -1;
        track.style.transform = `translateX(${amountToMove}%)`;
    };

    const handleSwipe = () => {
        // Minimum distance in pixels to trigger a swipe
        const swipeThreshold = 50;

        const diff = touchStartX - touchEndX;

        if (Math.abs(diff) > swipeThreshold) {
            if (diff > 0) {
                // Swiped left
                moveToSlide(currentIndex + 1);
            } else {
                // Swiped right
                moveToSlide(currentIndex - 1);
            }
        }
    };

    // Next button click
    leftButton.addEventListener("click", () => {
        moveToSlide(currentIndex - 1);
    });

    // Previous button click
    rightButton.addEventListener("click", () => {
        moveToSlide(currentIndex + 1);
    });

    // Touch events for mobile swipe
    trackContainer.addEventListener(
        "touchstart",
        (e) => {
            touchStartX = e.changedTouches[0].screenX;
            isDragging = true;
        },
        { passive: true },
    );

    trackContainer.addEventListener(
        "touchmove",
        (e) => {
            if (!isDragging) return;
            touchEndX = e.changedTouches[0].screenX;
        },
        { passive: true },
    );

    trackContainer.addEventListener("touchend", () => {
        if (!isDragging) return;
        isDragging = false;
        handleSwipe();
    });

    // Mouse events for desktop drag (optional, for better UX)
    trackContainer.addEventListener("mousedown", (e) => {
        touchStartX = e.screenX;
        isDragging = true;
        trackContainer.style.cursor = "grabbing";
    });

    trackContainer.addEventListener("mousemove", (e) => {
        if (!isDragging) return;
        touchEndX = e.screenX;
    });

    trackContainer.addEventListener("mouseup", () => {
        if (!isDragging) return;
        isDragging = false;
        trackContainer.style.cursor = "grab";
        handleSwipe();
    });

    trackContainer.addEventListener("mouseleave", () => {
        if (isDragging) {
            isDragging = false;
            trackContainer.style.cursor = "grab";
        }
    });

    // Set initial cursor style
    trackContainer.style.cursor = "grab";
</script>

        <script>
            (() => {
                const prefetched = new Set();

                const isSameOrigin = (url) => {
                    try {
                        return (
                            new URL(url, window.location.href).origin ===
                            window.location.origin
                        );
                    } catch {
                        return false;
                    }
                };

                const normalizeHref = (href) => {
                    if (!href) return null;
                    const url = new URL(href, window.location.href);
                    return url.pathname + url.search + url.hash;
                };

                const prefetchLink = (href) => {
                    if (!href || !isSameOrigin(href)) return;
                    const normalized = normalizeHref(href);
                    if (!normalized || prefetched.has(normalized)) return;
                    prefetched.add(normalized);

                    const link = document.createElement("link");
                    link.rel = "prefetch";
                    link.href = normalized;
                    link.as = "document";
                    document.head.appendChild(link);
                };

                window.dulcePrefetch = {
                    prefetchLink,
                };

                const prefetchGallery = () => {
                    prefetchLink("/gallery/");
                };

                if (document.readyState === "loading") {
                    document.addEventListener(
                        "DOMContentLoaded",
                        prefetchGallery,
                    );
                } else {
                    prefetchGallery();
                }
            })();
        </script>
