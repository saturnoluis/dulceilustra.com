<!doctype html>
<html lang="en" data-theme="light">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="robots" content="noindex, nofollow" />

        <link rel="stylesheet" href="/css/pico.min.css" />
        <link rel="stylesheet" href="/css/main.css" />

        <title>404 - Page Not Found</title>
    </head>

    <body>
        <div class="main-container">
            <header class="header margin-bottom">
                <nav class="header__nav">
                    <a class="header__logo" href="/">
                        <img
                            src="/images/dulceilustra__firma.png"
                            alt="@dulceilustra"
                        />
                    </a>
                    <ul><li>
                            <a href="/" class="header__link">
                                <span class="es">Inicio</span>
                                <span class="en">Home</span>
                            </a>
                        </li><li>
                            <a href="/gallery" class="header__link">
                                <span class="es">Galería</span>
                                <span class="en">Gallery</span>
                            </a>
                        </li><li>
                            <a href="/contact" class="header__link">
                                <span class="es">Contacto</span>
                                <span class="en">Contact</span>
                            </a>
                        </li></ul>
                </nav>
            </header>
            <div class="content">
<main class="error-page">
    <section class="error-page__content">
        <h1>Page Not Found</h1>
<p>The page you are looking for does not exist.</p>

    </section>
</main>
</div>
        </div>
        <footer class="footer">
            <div class="footer__content">
                <p class="copyright">
					<span>&copy; 2026 @DulceIlustra.</span>
                    <span class="es">Todos los derechos reservados.</span>
                    <span class="en">All rights reserved.</span>
                </p>
            </div>
        </footer>
        <script>
            (() => {
                const prefetched = new Set();

                const isSameOrigin = (url) => {
                    try {
                        return (
                            new URL(url, window.location.href).origin ===
                            window.location.origin
                        );
                    } catch {
                        return false;
                    }
                };

                const normalizeHref = (href) => {
                    if (!href) return null;
                    const url = new URL(href, window.location.href);
                    return url.pathname + url.search + url.hash;
                };

                const prefetchLink = (href) => {
                    if (!href || !isSameOrigin(href)) return;
                    const normalized = normalizeHref(href);
                    if (!normalized || prefetched.has(normalized)) return;
                    prefetched.add(normalized);

                    const link = document.createElement("link");
                    link.rel = "prefetch";
                    link.href = normalized;
                    link.as = "document";
                    document.head.appendChild(link);
                };

                window.dulcePrefetch = {
                    prefetchLink,
                };

                const prefetchGallery = () => {
                    prefetchLink("/gallery/");
                };

                if (document.readyState === "loading") {
                    document.addEventListener(
                        "DOMContentLoaded",
                        prefetchGallery,
                    );
                } else {
                    prefetchGallery();
                }
            })();
        </script>
    </body>
</html>
